name: Compile ControlTank
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 下载 SourceMod 1.12 编译器
      - name: Setup SourceMod
        run: |
          wget -O sourcemod.tar.gz https://sm.alliedmods.net/smdrop/1.12/sourcemod-1.12.0-git6942-linux.tar.gz
          tar -xzf sourcemod.tar.gz

      # 复制你上传的所有头文件到编译器目录
      - name: Copy includes
        run: |
          cp addons/sourcemod/scripting/include/*.inc addons/sourcemod/scripting/include/

      # 编译你的插件
      - name: Compile plugin
        run: |
          cp *.sp addons/sourcemod/scripting/
          cd addons/sourcemod/scripting/
          ./spcomp ControlTank.sp -o ../../../../ControlTank.smx

      # 上传编译好的 smx 文件
      - name: Upload compiled plugin
        uses: actions/upload-artifact@v4
        with:
          name: ControlTank.smx
          path: ControlTank.smx
